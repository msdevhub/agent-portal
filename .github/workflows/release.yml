name: Release agent-portal

on:
  push:
    branches: [main]
    paths:
      - "**"
      - "!README.md"

permissions:
  contents: write

env:
  REGISTRY: externalacr.azurecr.io
  IMAGE_NAME: agent-portal

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version & short SHA
        id: meta
        run: |
          VERSION=$(node -p "require('./v2-pixel/package.json').version")
          SHA_SHORT=$(git rev-parse --short HEAD)
          TAG="v${VERSION}-${SHA_SHORT}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_full=${REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: externalacr
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_full }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image_full }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "agent-portal ${{ steps.meta.outputs.version }} (${{ steps.meta.outputs.sha_short }})"
          body: |
            ## Agent Portal ${{ steps.meta.outputs.version }}

            **Docker image:**
            ```
            docker pull ${{ steps.meta.outputs.image_full }}:${{ steps.meta.outputs.tag }}
            ```

            **Run:**
            ```bash
            docker run -d -p 18820:18820 \
              ${{ steps.meta.outputs.image_full }}:${{ steps.meta.outputs.tag }}
            ```
