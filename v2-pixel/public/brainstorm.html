<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawCraft 头脑风暴 v2</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #d4d4d8; max-width: 900px; margin: 0 auto; padding: 20px 40px; line-height: 1.7; }
  h1 { color: #34d399; border-bottom: 1px solid #27272a; padding-bottom: 10px; }
  h2 { color: #5eead4; margin-top: 2em; }
  h3 { color: #a1a1aa; }
  table { border-collapse: collapse; width: 100%; margin: 1em 0; }
  th, td { border: 1px solid #27272a; padding: 8px 12px; text-align: left; }
  th { background: #18181b; color: #34d399; }
  blockquote { border-left: 3px solid #34d399; padding-left: 16px; color: #a1a1aa; margin: 1em 0; }
  code { background: #18181b; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
  hr { border: none; border-top: 1px solid #27272a; margin: 2em 0; }
  ul, ol { padding-left: 1.5em; }
  li { margin: 4px 0; }
  strong { color: #fbbf24; }
  a { color: #34d399; }
</style>
</head>
<body>
<div id="content">Loading...</div>
<script>
fetch('/brainstorm-v2.md')
  .then(r => r.text())
  .then(md => { document.getElementById('content').innerHTML = marked.parse(md); })
  .catch(e => { document.getElementById('content').textContent = 'Error: ' + e; });
</script>
</body>
</html>
